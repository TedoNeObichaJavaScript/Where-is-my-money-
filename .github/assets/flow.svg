<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 220" width="1280" height="220" role="img" aria-label="Privacy diagram: data flows from you to your phone, exports only to a file you choose, and never reaches any server.">
  <defs>
    <style>
      .lbl  { font: 600 13px ui-sans-serif, system-ui, sans-serif; fill: #0F1216; letter-spacing: 0.6px; }
      .lblL { font: 700 16px ui-sans-serif, system-ui, sans-serif; fill: #E7E9EE; }
      .lblD { font: 500 12px ui-monospace, "JetBrains Mono", Menlo, monospace; fill: #E7E9EE; opacity: 0.6; }
      .x    { font: 800 30px ui-sans-serif, system-ui, sans-serif; fill: #F2555A; }
    </style>
  </defs>

  <rect width="1280" height="220" fill="#0F1216"/>

  <!-- YOU -->
  <g transform="translate(80,70)">
    <rect width="180" height="80" rx="14" fill="#3DD68C"/>
    <text class="lbl" x="90" y="38" text-anchor="middle" font-size="16" font-weight="700">YOU</text>
    <text class="lbl" x="90" y="58" text-anchor="middle" font-weight="500" opacity="0.8">manual entry</text>
  </g>

  <!-- PHONE -->
  <g transform="translate(380,40)">
    <rect width="220" height="140" rx="18" fill="#181B21" stroke="#E7E9EE" stroke-opacity="0.10"/>
    <rect x="14" y="14" width="48" height="20" rx="6" fill="#3DD68C"/>
    <text class="lbl" x="38" y="28" text-anchor="middle">PHONE</text>
    <text class="lblL" x="110" y="74" text-anchor="middle">expo-sqlite + SQLCipher</text>
    <text class="lblD" x="110" y="96" text-anchor="middle">key in Keychain / Keystore</text>
    <text class="lblD" x="110" y="116" text-anchor="middle">never leaves the device</text>
  </g>

  <!-- JSON BACKUP -->
  <g transform="translate(720,40)">
    <rect width="200" height="140" rx="18" fill="#181B21" stroke="#E7E9EE" stroke-opacity="0.10" stroke-dasharray="4 4"/>
    <text class="lblL" x="100" y="64" text-anchor="middle">JSON BACKUP</text>
    <text class="lblD" x="100" y="86" text-anchor="middle">your file. your folder.</text>
    <text class="lblD" x="100" y="106" text-anchor="middle">share sheet · you choose where</text>
  </g>

  <!-- SERVER (never) -->
  <g transform="translate(1020,40)">
    <rect width="200" height="140" rx="18" fill="#181B21" stroke="#F2555A" stroke-opacity="0.45" stroke-dasharray="6 6"/>
    <text class="x" x="100" y="80" text-anchor="middle">∅</text>
    <text class="lblL" x="100" y="110" text-anchor="middle">SERVER · CLOUD</text>
    <text class="lblD" x="100" y="130" text-anchor="middle">never. by design.</text>
  </g>

  <!-- YOU -> PHONE -->
  <line x1="260" y1="110" x2="380" y2="110" stroke="#3DD68C" stroke-width="3" stroke-linecap="round"/>
  <polygon points="376,104 384,110 376,116" fill="#3DD68C"/>
  <circle r="5" fill="#3DD68C">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M 260 110 L 376 110"/>
  </circle>

  <!-- PHONE -> JSON (optional) -->
  <line x1="600" y1="110" x2="720" y2="110" stroke="#3DD68C" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 5" opacity="0.7"/>
  <polygon points="716,104 724,110 716,116" fill="#3DD68C" opacity="0.7"/>
  <circle r="5" fill="#3DD68C" opacity="0.7">
    <animateMotion dur="3.5s" begin="1s" repeatCount="indefinite" path="M 600 110 L 716 110"/>
  </circle>

  <!-- BLOCKED PHONE -> SERVER -->
  <line x1="600" y1="160" x2="1020" y2="160" stroke="#F2555A" stroke-width="2" stroke-dasharray="2 6" opacity="0.45"/>
  <g transform="translate(810,150)">
    <circle r="14" fill="#0F1216" stroke="#F2555A" stroke-width="2"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#F2555A" stroke-width="3" stroke-linecap="round"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#F2555A" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- legend -->
  <text class="lblD" x="80" y="40" opacity="0.5">DATA FLOW · what leaves your phone, and what doesn't</text>
</svg>
