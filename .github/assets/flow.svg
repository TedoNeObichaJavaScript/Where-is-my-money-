<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 220" width="1280" height="220" role="img" aria-label="Privacy diagram: data flows from user to phone and stops there.">
  <defs>
    <linearGradient id="coral2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F1957A"/>
      <stop offset="100%" stop-color="#E07A5F"/>
    </linearGradient>
    <linearGradient id="sage2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9BC5A8"/>
      <stop offset="100%" stop-color="#7BA98C"/>
    </linearGradient>
    <style>
      .lbl { font: 600 13px ui-sans-serif, system-ui, sans-serif; fill: #1A1816; letter-spacing: 0.6px; }
      .lblL { font: 700 16px ui-sans-serif, system-ui, sans-serif; fill: #1A1816; }
      .lblD { font: 500 12px ui-monospace, "JetBrains Mono", Menlo, monospace; fill: #1A1816; opacity: 0.65; }
      .x    { font: 800 28px ui-sans-serif, system-ui, sans-serif; fill: #C53030; }
    </style>
  </defs>

  <rect width="1280" height="220" fill="#FAF6F1"/>

  <!-- nodes -->
  <g transform="translate(80,70)">
    <rect width="180" height="80" rx="14" fill="url(#sage2)"/>
    <text class="lblL" x="90" y="40" text-anchor="middle" fill="#0E2A1A">YOU</text>
    <text class="lblD" x="90" y="60" text-anchor="middle" fill="#0E2A1A">manual entry</text>
  </g>

  <g transform="translate(380,40)">
    <rect width="220" height="140" rx="18" fill="#FFF" stroke="#1A1816" stroke-opacity="0.12"/>
    <rect x="14" y="14" width="40" height="20" rx="6" fill="url(#coral2)"/>
    <text class="lbl" x="34" y="28" text-anchor="middle" fill="#FAF6F1">PHONE</text>
    <text class="lblL" x="110" y="74" text-anchor="middle">Room + SQLCipher</text>
    <text class="lblD" x="110" y="96" text-anchor="middle">AES-GCM key in Android Keystore</text>
    <text class="lblD" x="110" y="116" text-anchor="middle">passphrase never leaves the device</text>
  </g>

  <g transform="translate(720,40)">
    <rect width="200" height="140" rx="18" fill="#FFF" stroke="#1A1816" stroke-opacity="0.12" stroke-dasharray="4 4"/>
    <text class="lblL" x="100" y="64" text-anchor="middle">JSON BACKUP</text>
    <text class="lblD" x="100" y="86" text-anchor="middle">your file. your folder.</text>
    <text class="lblD" x="100" y="106" text-anchor="middle">SAF · user-chosen location</text>
  </g>

  <g transform="translate(1020,40)">
    <rect width="200" height="140" rx="18" fill="#FFF" stroke="#C53030" stroke-opacity="0.5" stroke-dasharray="6 6"/>
    <text class="x" x="100" y="78" text-anchor="middle">∅</text>
    <text class="lblL" x="100" y="108" text-anchor="middle">SERVER · CLOUD</text>
    <text class="lblD" x="100" y="128" text-anchor="middle">never. by design.</text>
  </g>

  <!-- arrows YOU -> PHONE (animated dot) -->
  <line x1="260" y1="110" x2="380" y2="110" stroke="#7BA98C" stroke-width="3" stroke-linecap="round"/>
  <polygon points="376,104 384,110 376,116" fill="#7BA98C"/>
  <circle r="5" fill="#7BA98C">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M 260 110 L 376 110"/>
  </circle>

  <!-- arrows PHONE -> JSON (animated dot, optional) -->
  <line x1="600" y1="110" x2="720" y2="110" stroke="#E07A5F" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 5"/>
  <polygon points="716,104 724,110 716,116" fill="#E07A5F"/>
  <circle r="5" fill="#E07A5F">
    <animateMotion dur="3.5s" begin="1s" repeatCount="indefinite" path="M 600 110 L 716 110"/>
  </circle>

  <!-- BLOCKED arrow PHONE -> SERVER -->
  <line x1="600" y1="160" x2="1020" y2="160" stroke="#C53030" stroke-width="2" stroke-dasharray="2 6" opacity="0.5"/>
  <g transform="translate(810,150)">
    <circle r="14" fill="#FAF6F1" stroke="#C53030" stroke-width="2"/>
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#C53030" stroke-width="3" stroke-linecap="round"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#C53030" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- legend -->
  <text class="lblD" x="80" y="40">DATA FLOW · what leaves your phone, and what doesn't</text>
</svg>
