<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="Where Is My Money? — Free Android personal finance tracker, structurally private.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1816"/>
      <stop offset="50%" stop-color="#221E1A"/>
      <stop offset="100%" stop-color="#15110E"/>
    </linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1957A"/>
      <stop offset="100%" stop-color="#E07A5F"/>
    </linearGradient>
    <linearGradient id="sage" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9BC5A8"/>
      <stop offset="100%" stop-color="#7BA98C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#E07A5F" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#E07A5F" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <style>
      .title { font: 700 64px ui-sans-serif, -apple-system, "Segoe UI", Roboto, system-ui, sans-serif; fill: #FAF6F1; letter-spacing: -1.5px; }
      .sub   { font: 500 22px ui-monospace, "JetBrains Mono", "Fira Code", Menlo, monospace; fill: #FAF6F1; opacity: 0.78; }
      .tag   { font: 600 13px ui-sans-serif, system-ui, sans-serif; fill: #FAF6F1; letter-spacing: 1.4px; }
      .coin  { font: 800 22px ui-sans-serif, system-ui, sans-serif; }
    </style>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <circle cx="980" cy="160" r="240" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <g stroke="#FAF6F1" stroke-opacity="0.04">
    <path d="M0 80 H1280 M0 180 H1280 M0 280 H1280"/>
    <path d="M160 0 V360 M320 0 V360 M480 0 V360 M640 0 V360 M800 0 V360 M960 0 V360 M1120 0 V360"/>
  </g>

  <!-- Floating coins / currency symbols -->
  <g class="coin">
    <text x="900" y="380" fill="#E07A5F" opacity="0.0">
      €
      <animate attributeName="y" values="380;-30" dur="6s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.15;0.85;1" dur="6s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text x="1040" y="380" fill="#7BA98C" opacity="0.0">
      лв
      <animate attributeName="y" values="380;-30" dur="7s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.15;0.85;1" dur="7s" begin="1.2s" repeatCount="indefinite"/>
    </text>
    <text x="1130" y="380" fill="#E07A5F" opacity="0.0">
      $
      <animate attributeName="y" values="380;-30" dur="5.5s" begin="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.15;0.85;1" dur="5.5s" begin="2.4s" repeatCount="indefinite"/>
    </text>
    <text x="850" y="380" fill="#7BA98C" opacity="0.0">
      €
      <animate attributeName="y" values="380;-30" dur="6.5s" begin="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0.7;0" keyTimes="0;0.15;0.85;1" dur="6.5s" begin="3.6s" repeatCount="indefinite"/>
    </text>
    <text x="1200" y="380" fill="#E07A5F" opacity="0.0">
      €
      <animate attributeName="y" values="380;-30" dur="8s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.15;0.85;1" dur="8s" begin="0.6s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Eyebrow tag -->
  <g transform="translate(64,82)">
    <rect x="0" y="0" width="190" height="28" rx="14" fill="#E07A5F" fill-opacity="0.14" stroke="#E07A5F" stroke-opacity="0.5"/>
    <circle cx="16" cy="14" r="4" fill="#7BA98C">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text class="tag" x="30" y="18">v0.2 · DEPLOYED · OFFLINE</text>
  </g>

  <!-- Title (dual-language, cross-fades) -->
  <g transform="translate(64,170)">
    <text class="title" x="0" y="0" opacity="1">
      Where Is My Money?
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text class="title" x="0" y="0" opacity="0">
      Къде са ми парите?
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.45;0.5;0.95;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <!-- Animated underline -->
    <rect x="0" y="14" height="6" rx="3" fill="url(#coral)" width="0">
      <animate attributeName="width" values="0;620;620;0" keyTimes="0;0.35;0.65;1" dur="9s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Subtitle -->
  <text class="sub" x="64" y="232">
    <tspan fill="#7BA98C">$</tspan> a finance app that <tspan fill="#E07A5F">cannot leak your data</tspan> — it never has any.
  </text>

  <!-- Feature pills -->
  <g transform="translate(64,266)" class="tag">
    <g>
      <rect width="120" height="32" rx="16" fill="none" stroke="#FAF6F1" stroke-opacity="0.18"/>
      <text x="60" y="20" text-anchor="middle">FREE FOREVER</text>
    </g>
    <g transform="translate(132,0)">
      <rect width="100" height="32" rx="16" fill="none" stroke="#FAF6F1" stroke-opacity="0.18"/>
      <text x="50" y="20" text-anchor="middle">NO BACKEND</text>
    </g>
    <g transform="translate(244,0)">
      <rect width="92" height="32" rx="16" fill="none" stroke="#FAF6F1" stroke-opacity="0.18"/>
      <text x="46" y="20" text-anchor="middle">NO ADS</text>
    </g>
    <g transform="translate(348,0)">
      <rect width="110" height="32" rx="16" fill="none" stroke="#FAF6F1" stroke-opacity="0.18"/>
      <text x="55" y="20" text-anchor="middle">EN · BG</text>
    </g>
    <g transform="translate(470,0)">
      <rect width="148" height="32" rx="16" fill="none" stroke="#FAF6F1" stroke-opacity="0.18"/>
      <text x="74" y="20" text-anchor="middle">SQLCIPHER · KEYSTORE</text>
    </g>
  </g>

  <!-- Animated bar chart on the right -->
  <g transform="translate(880,210)">
    <rect x="0"   y="60" width="22" height="0" rx="4" fill="url(#sage)">
      <animate attributeName="height" values="0;72;72;0" keyTimes="0;0.4;0.6;1" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="y"      values="60;-12;-12;60" keyTimes="0;0.4;0.6;1" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="34"  y="60" width="22" height="0" rx="4" fill="url(#coral)">
      <animate attributeName="height" values="0;42;42;0" keyTimes="0;0.4;0.6;1" dur="4.5s" begin="0.15s" repeatCount="indefinite"/>
      <animate attributeName="y"      values="60;18;18;60"  keyTimes="0;0.4;0.6;1" dur="4.5s" begin="0.15s" repeatCount="indefinite"/>
    </rect>
    <rect x="68"  y="60" width="22" height="0" rx="4" fill="url(#sage)">
      <animate attributeName="height" values="0;58;58;0" keyTimes="0;0.4;0.6;1" dur="4.5s" begin="0.30s" repeatCount="indefinite"/>
      <animate attributeName="y"      values="60;2;2;60"  keyTimes="0;0.4;0.6;1" dur="4.5s" begin="0.30s" repeatCount="indefinite"/>
    </rect>
    <rect x="102" y="60" width="22" height="0" rx="4" fill="url(#coral)">
      <animate attributeName="height" values="0;30;30;0" keyTimes="0;0.4;0.6;1" dur="4.5s" begin="0.45s" repeatCount="indefinite"/>
      <animate attributeName="y"      values="60;30;30;60" keyTimes="0;0.4;0.6;1" dur="4.5s" begin="0.45s" repeatCount="indefinite"/>
    </rect>
    <rect x="136" y="60" width="22" height="0" rx="4" fill="url(#sage)">
      <animate attributeName="height" values="0;88;88;0" keyTimes="0;0.4;0.6;1" dur="4.5s" begin="0.60s" repeatCount="indefinite"/>
      <animate attributeName="y"      values="60;-28;-28;60" keyTimes="0;0.4;0.6;1" dur="4.5s" begin="0.60s" repeatCount="indefinite"/>
    </rect>
    <line x1="-6" y1="62" x2="170" y2="62" stroke="#FAF6F1" stroke-opacity="0.2"/>
  </g>

  <!-- Phone silhouette with animated ledger lines -->
  <g transform="translate(1080,40)">
    <rect x="0" y="0" width="160" height="280" rx="22" fill="#0E0C0A" stroke="#FAF6F1" stroke-opacity="0.18"/>
    <rect x="10" y="10" width="140" height="260" rx="14" fill="#FAF6F1" fill-opacity="0.04"/>
    <!-- header -->
    <rect x="22" y="26" width="60" height="10" rx="5" fill="#FAF6F1" fill-opacity="0.5"/>
    <rect x="22" y="44" width="100" height="22" rx="6" fill="url(#sage)" opacity="0.85"/>
    <!-- list rows -->
    <g>
      <rect x="22" y="86"  width="116" height="14" rx="4" fill="#FAF6F1" fill-opacity="0">
        <animate attributeName="fill-opacity" values="0;0.18;0.18" keyTimes="0;0.2;1" dur="4s" repeatCount="indefinite"/>
      </rect>
      <rect x="22" y="108" width="116" height="14" rx="4" fill="#FAF6F1" fill-opacity="0">
        <animate attributeName="fill-opacity" values="0;0;0.18;0.18" keyTimes="0;0.25;0.45;1" dur="4s" repeatCount="indefinite"/>
      </rect>
      <rect x="22" y="130" width="116" height="14" rx="4" fill="#FAF6F1" fill-opacity="0">
        <animate attributeName="fill-opacity" values="0;0;0;0.18;0.18" keyTimes="0;0.3;0.5;0.65;1" dur="4s" repeatCount="indefinite"/>
      </rect>
      <rect x="22" y="152" width="116" height="14" rx="4" fill="#FAF6F1" fill-opacity="0">
        <animate attributeName="fill-opacity" values="0;0;0;0;0.18;0.18" keyTimes="0;0.4;0.55;0.7;0.85;1" dur="4s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- FAB -->
    <circle cx="130" cy="240" r="18" fill="url(#coral)">
      <animate attributeName="r" values="18;20;18" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="130" y="246" text-anchor="middle" font-size="22" font-family="system-ui" font-weight="700" fill="#FAF6F1">+</text>
  </g>

  <!-- bottom signature -->
  <text class="tag" x="64" y="328" opacity="0.55">bg.parite.app  ·  min sdk 26  ·  target 35  ·  kotlin · compose · room · sqlcipher</text>
</svg>
