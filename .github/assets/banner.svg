<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="Where Is My Money? — A free, private personal finance tracker for iOS and Android. Manual entry, no login, no cloud, no ads.">
  <defs>
    <style>
      .title { font: 700 62px ui-sans-serif, -apple-system, "Segoe UI", Roboto, system-ui, sans-serif; fill: #E7E9EE; letter-spacing: -1.5px; }
      .sub   { font: 500 21px ui-monospace, "JetBrains Mono", "Fira Code", Menlo, monospace; fill: #E7E9EE; opacity: 0.72; }
      .tag   { font: 600 13px ui-sans-serif, system-ui, sans-serif; fill: #E7E9EE; letter-spacing: 1.4px; }
      .pill  { font: 600 12px ui-sans-serif, system-ui, sans-serif; fill: #E7E9EE; letter-spacing: 1px; opacity: 0.82; }
      .sig   { font: 500 13px ui-monospace, "JetBrains Mono", Menlo, monospace; fill: #E7E9EE; letter-spacing: 0.4px; opacity: 0.42; }
    </style>
  </defs>

  <!-- Flat Refined-Dark canvas -->
  <rect width="1280" height="360" fill="#0F1216"/>

  <!-- Subtle grid -->
  <g stroke="#E7E9EE" stroke-opacity="0.035">
    <path d="M0 80 H1280 M0 180 H1280 M0 280 H1280"/>
    <path d="M160 0 V360 M320 0 V360 M480 0 V360 M640 0 V360 M800 0 V360 M960 0 V360 M1120 0 V360"/>
  </g>

  <!-- Eyebrow tag -->
  <g transform="translate(64,82)">
    <rect x="0" y="0" width="232" height="28" rx="8" fill="#3DD68C" fill-opacity="0.10" stroke="#3DD68C" stroke-opacity="0.40"/>
    <circle cx="17" cy="14" r="4" fill="#3DD68C">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text class="tag" x="32" y="18" fill="#3DD68C">iOS · ANDROID · OFFLINE</text>
  </g>

  <!-- Title (dual-language cross-fade) -->
  <g transform="translate(64,170)">
    <text class="title" x="0" y="0" opacity="1">
      Where Is My Money?
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <text class="title" x="0" y="0" opacity="0">
      Къде са ми парите?
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.45;0.5;0.95;1" dur="9s" repeatCount="indefinite"/>
    </text>
    <!-- Animated emerald underline -->
    <rect x="0" y="16" height="5" rx="2.5" fill="#3DD68C" width="0">
      <animate attributeName="width" values="0;600;600;0" keyTimes="0;0.35;0.65;1" dur="9s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Subtitle -->
  <text class="sub" x="64" y="232">
    <tspan fill="#3DD68C">$</tspan> a finance app that <tspan fill="#3DD68C" opacity="1">cannot leak your data</tspan> — it never has any.
  </text>

  <!-- Feature pills -->
  <g transform="translate(64,266)">
    <g>
      <rect width="128" height="32" rx="8" fill="none" stroke="#E7E9EE" stroke-opacity="0.16"/>
      <text class="pill" x="64" y="20" text-anchor="middle">FREE FOREVER</text>
    </g>
    <g transform="translate(140,0)">
      <rect width="116" height="32" rx="8" fill="none" stroke="#E7E9EE" stroke-opacity="0.16"/>
      <text class="pill" x="58" y="20" text-anchor="middle">NO NETWORK</text>
    </g>
    <g transform="translate(268,0)">
      <rect width="80" height="32" rx="8" fill="none" stroke="#E7E9EE" stroke-opacity="0.16"/>
      <text class="pill" x="40" y="20" text-anchor="middle">NO ADS</text>
    </g>
    <g transform="translate(360,0)">
      <rect width="92" height="32" rx="8" fill="none" stroke="#E7E9EE" stroke-opacity="0.16"/>
      <text class="pill" x="46" y="20" text-anchor="middle">EN · BG</text>
    </g>
    <g transform="translate(464,0)">
      <rect width="160" height="32" rx="8" fill="none" stroke="#E7E9EE" stroke-opacity="0.16"/>
      <text class="pill" x="80" y="20" text-anchor="middle">SQLCIPHER · KEYSTORE</text>
    </g>
  </g>

  <!-- Animated bar chart (emerald) -->
  <g transform="translate(884,210)">
    <rect x="0"   y="60" width="22" height="0" rx="3" fill="#3DD68C" fill-opacity="0.55">
      <animate attributeName="height" values="0;72;72;0" keyTimes="0;0.4;0.6;1" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="y"      values="60;-12;-12;60" keyTimes="0;0.4;0.6;1" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="34"  y="60" width="22" height="0" rx="3" fill="#3DD68C" fill-opacity="0.85">
      <animate attributeName="height" values="0;42;42;0" keyTimes="0;0.4;0.6;1" dur="4.5s" begin="0.15s" repeatCount="indefinite"/>
      <animate attributeName="y"      values="60;18;18;60"  keyTimes="0;0.4;0.6;1" dur="4.5s" begin="0.15s" repeatCount="indefinite"/>
    </rect>
    <rect x="68"  y="60" width="22" height="0" rx="3" fill="#3DD68C" fill-opacity="0.55">
      <animate attributeName="height" values="0;58;58;0" keyTimes="0;0.4;0.6;1" dur="4.5s" begin="0.30s" repeatCount="indefinite"/>
      <animate attributeName="y"      values="60;2;2;60"  keyTimes="0;0.4;0.6;1" dur="4.5s" begin="0.30s" repeatCount="indefinite"/>
    </rect>
    <rect x="102" y="60" width="22" height="0" rx="3" fill="#3DD68C" fill-opacity="0.85">
      <animate attributeName="height" values="0;30;30;0" keyTimes="0;0.4;0.6;1" dur="4.5s" begin="0.45s" repeatCount="indefinite"/>
      <animate attributeName="y"      values="60;30;30;60" keyTimes="0;0.4;0.6;1" dur="4.5s" begin="0.45s" repeatCount="indefinite"/>
    </rect>
    <rect x="136" y="60" width="22" height="0" rx="3" fill="#3DD68C" fill-opacity="0.55">
      <animate attributeName="height" values="0;88;88;0" keyTimes="0;0.4;0.6;1" dur="4.5s" begin="0.60s" repeatCount="indefinite"/>
      <animate attributeName="y"      values="60;-28;-28;60" keyTimes="0;0.4;0.6;1" dur="4.5s" begin="0.60s" repeatCount="indefinite"/>
    </rect>
    <line x1="-6" y1="62" x2="170" y2="62" stroke="#E7E9EE" stroke-opacity="0.18"/>
  </g>

  <!-- Phone mock (Refined-Dark surface card) -->
  <g transform="translate(1080,40)">
    <rect x="0" y="0" width="160" height="280" rx="22" fill="#181B21" stroke="#E7E9EE" stroke-opacity="0.10"/>
    <rect x="10" y="10" width="140" height="260" rx="14" fill="#0F1216"/>
    <!-- header -->
    <rect x="22" y="26" width="56" height="9" rx="4.5" fill="#E7E9EE" fill-opacity="0.4"/>
    <rect x="22" y="44" width="100" height="22" rx="6" fill="#3DD68C" fill-opacity="0.85"/>
    <!-- list rows -->
    <g>
      <rect x="22" y="86"  width="116" height="14" rx="4" fill="#E7E9EE" fill-opacity="0">
        <animate attributeName="fill-opacity" values="0;0.14;0.14" keyTimes="0;0.2;1" dur="4s" repeatCount="indefinite"/>
      </rect>
      <rect x="22" y="108" width="116" height="14" rx="4" fill="#E7E9EE" fill-opacity="0">
        <animate attributeName="fill-opacity" values="0;0;0.14;0.14" keyTimes="0;0.25;0.45;1" dur="4s" repeatCount="indefinite"/>
      </rect>
      <rect x="22" y="130" width="116" height="14" rx="4" fill="#E7E9EE" fill-opacity="0">
        <animate attributeName="fill-opacity" values="0;0;0;0.14;0.14" keyTimes="0;0.3;0.5;0.65;1" dur="4s" repeatCount="indefinite"/>
      </rect>
      <rect x="22" y="152" width="116" height="14" rx="4" fill="#E7E9EE" fill-opacity="0">
        <animate attributeName="fill-opacity" values="0;0;0;0;0.14;0.14" keyTimes="0;0.4;0.55;0.7;0.85;1" dur="4s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- Rounded-square emerald Add FAB (matches app) -->
    <rect x="112" y="222" width="36" height="36" rx="11" fill="#3DD68C">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <line x1="130" y1="232" x2="130" y2="248" stroke="#0F1216" stroke-width="3" stroke-linecap="round"/>
    <line x1="122" y1="240" x2="138" y2="240" stroke="#0F1216" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Bottom signature (correct RN stack) -->
  <text class="sig" x="64" y="328">bg.parite.app  ·  expo · react native · typescript · expo-sqlite + sqlcipher · i18next</text>
</svg>
